services:
  - type: web
    name: docmind-ai-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.deploy.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api/v1
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: GEMINI_EMBEDDING_MODEL_NAME
        value: models/gemini-embedding-001
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL_NAME
        value: models/gemini-flash-latest
      - key: VECTOR_STORE_PROVIDER
        value: memory
      - key: UPLOAD_DIR
        value: uploads
      - key: STORAGE_DIR
        value: storage
      - key: PARSED_DOCS_DIR
        value: parsed_docs
      - key: OCR_OUTPUT_DIR
        value: ocr_outputs
      - key: LOG_DIR
        value: logs
